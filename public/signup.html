<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autopilot — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

  <nav class="topbar">
    <div class="topbar-left">
      <a href="/" class="nav-logo">
        <span class="logo-square">&#9632;</span>
        AUTOPILOT
        <span class="logo-square">&#9632;</span>
      </a>
    </div>
    <div class="topbar-right">
      <a href="/login" class="nav-btn login-btn">&#9632; LOGIN</a>
      <a href="/signup" class="nav-btn signup-btn">&#9632; SIGN UP</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-box">
      <div class="card-corner tl"></div>
      <div class="card-corner tr"></div>
      <div class="card-corner bl"></div>
      <div class="card-corner br"></div>

      <h2 class="auth-title">&#9632; CREATE ACCOUNT &#9632;</h2>
      <p class="auth-subtitle">JOIN THE QUEST. BUILD YOUR CHARACTER.</p>

      <form id="signupForm" autocomplete="off">
        <div class="field">
          <label for="username">USERNAME</label>
          <input type="text" id="username" placeholder="your_handle" required>
        </div>

        <div class="field">
          <label for="email">EMAIL</label>
          <input type="email" id="email" placeholder="your.email@university.edu" required>
        </div>

        <div class="field">
          <label for="password">PASSWORD</label>
          <div class="password-wrap">
            <input type="password" id="password" minlength="6" required>
            <button type="button" class="toggle-pw" onclick="togglePassword()">&#9673;</button>
          </div>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <button type="submit" class="auth-submit">&#9632; SIGN UP &#9632;</button>
      </form>

      <div class="auth-footer">
        <a href="/login">&#9632; ALREADY HAVE AN ACCOUNT? SIGN IN &#9632;</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').onsubmit = function(e) {
      e.preventDefault();
      var username = document.getElementById('username').value;
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';

      fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, email: email, password: password })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          errorMsg.textContent = data.error.toUpperCase();
        } else {
          window.location.href = '/dashboard';
        }
      })
      .catch(function() {
        errorMsg.textContent = 'SOMETHING WENT WRONG';
      });
    };

    function togglePassword() {
      var pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
